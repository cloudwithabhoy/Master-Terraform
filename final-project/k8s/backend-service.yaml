# =============================================================================
# backend-service.yaml  —  In-cluster ClusterIP Service — never internet-
# facing. The frontend reaches this over the cluster's internal DNS
# ("http://backend:8080", same namespace) — see frontend-deployment.yaml's
# BACKEND_URL env var.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
